# ══════════════════════════════════════════════════════════════
# OpsMind AI — Render.com Deployment Blueprint
# Docs: https://render.com/docs/blueprint-spec
# ══════════════════════════════════════════════════════════════

services:
  - type: web
    name: opsmind-ai-backend
    env: node
    region: oregon
    plan: starter

    buildCommand: npm install
    startCommand: node src/server.js

    healthCheckPath: /health

    # Auto-deploy on push to main
    autoDeploy: true
    branch: main

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: LOG_LEVEL
        value: warn

      # ── Secrets (set manually in Render dashboard) ──
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true       # Render auto-generates a secure value
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false               # Optional — only if LLM_PROVIDER=groq

      # ── LLM Config ──
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_PROVIDER
        value: gemini

      # ── Atlas Vector Search ──
      - key: VECTOR_INDEX_NAME
        value: vector_index

      # ── CORS — update to your frontend domain ──
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000"   # Change to your frontend URL

      # ── RAG Tuning ──
      - key: SIMILARITY_THRESHOLD
        value: "0.70"
      - key: TOP_K_RESULTS
        value: "5"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: RERANK_ENABLED
        value: "true"
      - key: RERANK_TOP_N
        value: "10"
      - key: RERANK_FINAL_N
        value: "5"

      # ── Upload & Cache ──
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: CACHE_TTL
        value: "3600"

      # ── Rate Limiting ──
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "200"

    # Persistent disk for uploaded PDFs
    disk:
      name: opsmind-uploads
      mountPath: /app/uploads
      sizeGB: 10
