# ══════════════════════════════════════════════════════════════
# OpsMind AI — Render.com Deployment Blueprint (Free Tier)
# Docs: https://render.com/docs/blueprint-spec
# ══════════════════════════════════════════════════════════════
# ⚠️  Before deploying, set these secrets in the Render Dashboard:
#     MONGODB_URI, GEMINI_API_KEY, JWT_SECRET (auto-generated)
# ══════════════════════════════════════════════════════════════

services:
  - type: web
    name: opsmind-ai-backend
    env: node
    region: oregon
    plan: free

    buildCommand: npm install
    startCommand: node src/server.js

    healthCheckPath: /health

    # Auto-deploy on push to main
    autoDeploy: true
    branch: main

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: LOG_LEVEL
        value: warn

      # ── Secrets (set manually in Render dashboard) ──────────────
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # ── LLM Config ──────────────────────────────────────────────
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_PROVIDER
        value: gemini

      # ── Atlas Vector Search ──────────────────────────────────────
      - key: VECTOR_INDEX_NAME
        value: vector_index

      # ── CORS — update to your deployed frontend URL ──────────────
      - key: ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"   # ← Change this to your Vercel/Netlify URL

      # ── RAG Tuning ───────────────────────────────────────────────
      - key: SIMILARITY_THRESHOLD
        value: "0.78"
      - key: TOP_K_RESULTS
        value: "5"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: RERANK_ENABLED
        value: "true"
      - key: RERANK_TOP_N
        value: "10"
      - key: RERANK_FINAL_N
        value: "5"

      # ── Upload & Cache ───────────────────────────────────────────
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: CACHE_TTL
        value: "3600"

      # ── Rate Limiting ────────────────────────────────────────────
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "200"

      # ── Temp Upload Dir (ephemeral /tmp — no persistent disk needed) ──
      - key: UPLOAD_DIR
        value: "/tmp/opsmind-uploads"

# NOTE: No 'disk:' block — persistent disk is a paid feature.
# PDFs are automatically deleted from disk after processing.
# All document content (chunks + embeddings) lives in MongoDB Atlas.

