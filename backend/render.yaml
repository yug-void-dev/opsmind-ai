services:
  - type: web
    name: opsmind-ai-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: VECTOR_INDEX_NAME
        value: vector_index
      - key: SIMILARITY_THRESHOLD
        value: "0.75"
      - key: TOP_K_RESULTS
        value: "5"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: CACHE_TTL
        value: "3600"
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 5
