version: '3.9'

services:
  opsmind-api:
    build:
      context: .
      target: production
    container_name: opsmind-ai-backend
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - opsmind-network

volumes:
  uploads_data:
    driver: local
  logs_data:
    driver: local

networks:
  opsmind-network:
    driver: bridge
