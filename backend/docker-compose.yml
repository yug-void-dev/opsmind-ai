version: '3.9'

# ══════════════════════════════════════════════════════════════════════
#  OpsMind AI — Docker Compose
#  Usage:
#    cp .env.example .env   # fill in your secrets
#    docker compose up -d   # start
#    docker compose logs -f # tail logs
# ══════════════════════════════════════════════════════════════════════

services:
  opsmind-ai-backend:
    build:
      context: .
      target: production
    container_name: opsmind-ai-backend
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - opsmind-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  uploads_data:
    driver: local
    name: opsmind_uploads
  logs_data:
    driver: local
    name: opsmind_logs

networks:
  opsmind-network:
    driver: bridge
    name: opsmind-network
